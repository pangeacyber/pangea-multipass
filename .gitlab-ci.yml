default:
  image: python:3.13.2@sha256:0293f851d58c726748c9f5d7dca65528ac2d38887b18a48e5689f6c59ef77ea9
  tags:
    - pangea-internal

.setup:
  update-pip:
    - pip install --upgrade pip
    - pip --version

  update-poetry:
    - pip install --upgrade "poetry>=2.0"
    - poetry --version

include:
  - /packages/pangea-multipass/.gitlab-ci.yml
  - /packages/pangea-multipass-langchain/.gitlab-ci.yml
  - /packages/pangea-multipass-llama-index/.gitlab-ci.yml
